name: Fleet Dashboard

# Aggrega le run degli agenti Claude (workflow "Agent *") su tutti i repo
# dell'organizzazione e costruisce TREND nel tempo (giorno / settimana / mese),
# scrive OBSERVABILITY.md e posta un riepilogo su Telegram.
# Singleton org-ops: gira solo in questo repo (.github). Serverless, zero infra.
#
# Secret richiesti su QUESTO repo (.github):
#   - MASTER_BOARD_TOKEN : PAT con scope repo (lettura repo + Actions della org)
#   - TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID : opzionali (se assenti, salta l'invio)

on:
  schedule:
    # 16:00 UTC = 18:00 ora italiana estiva (CEST). In inverno (CET) sono le 17:00:
    # il cron di GitHub è in UTC e NON gestisce il DST. Per ancorare le 18:00 all'ora
    # solare invernale, usare "0 17 * * *".
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fleet-dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ORG: CBM-Solutions
      GH_TOKEN: ${{ secrets.MASTER_BOARD_TOKEN }}
      WINDOW_DAYS: "180"     # storico raccolto: serve a costruire i trend mensili
      DAYS_SHOWN: "14"       # righe nella tabella trend per giorno
      WEEKS_SHOWN: "12"      # righe nella tabella trend per settimana (ISO)
      MONTHS_SHOWN: "6"      # righe nella tabella trend per mese
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Aggrega run degli agenti e genera OBSERVABILITY.md
        run: |
          set -euo pipefail
          SINCE=$(date -u -d "-${WINDOW_DAYS} days" +%Y-%m-%dT%H:%M:%SZ)
          OUT=OBSERVABILITY.md
          TMP=$(mktemp -d)

          repos=$(gh repo list "$ORG" --no-archived --limit 200 --json name --jq '.[].name')

          # repo \t agent \t conclusion \t duration_s \t day(YYYY-MM-DD)
          : > "$TMP/rows.tsv"
          for repo in $repos; do
            gh run list --repo "$ORG/$repo" --limit 500 \
              --created ">$SINCE" \
              --json workflowName,conclusion,createdAt,updatedAt \
              --jq '.[] | select(.workflowName|test("^Agent ")) |
                    [ "'"$repo"'", .workflowName, (.conclusion // "running"),
                      (( (.updatedAt|fromdateiso8601) - (.createdAt|fromdateiso8601) )|tostring),
                      (.createdAt[0:10]) ] | @tsv' \
              >> "$TMP/rows.tsv" 2>/dev/null || echo "skip $repo (nessun workflow/permesso)"
          done

          # Mappa giorno -> settimana ISO (YYYY-Www) e mese (YYYY-MM) via GNU date.
          # day \t week \t month
          : > "$TMP/daymap.tsv"
          cut -f5 "$TMP/rows.tsv" | sort -u | while read -r d; do
            [ -n "$d" ] || continue
            wk=$(date -u -d "$d" +%G-W%V)
            printf '%s\t%s\t%s\n' "$d" "$wk" "${d:0:7}" >> "$TMP/daymap.tsv"
          done

          # trend <day|week|month> <n_righe>  -> bucket eff succ fail rate avgdur (TSV, ordinato, ultime n)
          trend () {
            awk -F'\t' -v bucket="$1" '
              NR==FNR { wk[$1]=$2; mo[$1]=$3; next }
              {
                day=$5
                key=(bucket=="day"?day:(bucket=="week"?wk[day]:mo[day]))
                if (key=="") next
                if ($3=="skipped") next
                eff[key]++
                if ($3=="success") s[key]++
                if ($3=="failure") f[key]++
                dur[key]+=$4
              }
              END {
                for (k in eff) {
                  rate=(eff[k]?sprintf("%d%%", s[k]*100/eff[k]):"n/a")
                  printf "%s\t%d\t%d\t%d\t%s\t%d\n", k, eff[k], s[k]+0, f[k]+0, rate, (eff[k]?dur[k]/eff[k]:0)
                }
              }' "$TMP/daymap.tsv" "$TMP/rows.tsv" | sort | tail -n "$2"
          }

          # md_trend <day|week|month> <n> <label>  -> tabella markdown
          md_trend () {
            echo "| $3 | Run | ✅ | 🔴 | Rate | Durata media (s) |"
            echo "|---|---|---|---|---|---|"
            trend "$1" "$2" | awk -F'\t' '{printf "| %s | %d | %d | %d | %s | %d |\n",$1,$2,$3,$4,$5,$6}'
          }

          # --- Riepilogo aggregato sull'intera finestra ---
          total=$(wc -l < "$TMP/rows.tsv" | tr -d ' ')
          succ=$(awk -F'\t' '$3=="success"' "$TMP/rows.tsv" | wc -l | tr -d ' ')
          fail=$(awk -F'\t' '$3=="failure"' "$TMP/rows.tsv" | wc -l | tr -d ' ')
          skip=$(awk -F'\t' '$3=="skipped"' "$TMP/rows.tsv" | wc -l | tr -d ' ')
          eff=$((total - skip))
          rate="n/a"; if [ "$eff" -gt 0 ]; then rate="$(( succ * 100 / eff ))%"; fi

          EST=$(awk -F'\t' '
            BEGIN{
              c["Agent Summary"]=0.02; c["Agent Review"]=0.15; c["Agent Security"]=0.20;
              c["Agent Fix"]=0.10; c["Agent Docs"]=0.07; c["Agent Test"]=0.20;
              c["Agent Refactor"]=0.14; c["Agent CICD"]=0.14; c["Agent IaC"]=0.10;
              c["Agent Maintain"]=0.17;
            }
            $3!="skipped"{ t += (($2 in c)?c[$2]:0.10) }
            END{ printf "%.2f", t+0 }' "$TMP/rows.tsv")

          {
            echo "# 📊 Fleet Dashboard — trend agenti Claude"
            echo ""
            echo "_Generato: $(date -u +'%Y-%m-%d %H:%M UTC') (~18:00 Europe/Rome) · org \`${ORG}\` · finestra ${WINDOW_DAYS} giorni_"
            echo ""
            echo "## Riepilogo finestra (${WINDOW_DAYS} giorni)"
            echo ""
            echo "| Metrica | Valore |"
            echo "|---|---|"
            echo "| Run totali (escl. skipped) | ${eff} |"
            echo "| ✅ Success | ${succ} |"
            echo "| 🔴 Failure | ${fail} |"
            echo "| Success rate | ${rate} |"
            echo "| ⏭️ Skipped (label non-match) | ${skip} |"
            echo "| 💸 Stima costo-equivalente | \$${EST} _(proxy, non fatturato su Max)_ |"
            echo ""
            echo "## 📅 Trend per giorno (ultimi ${DAYS_SHOWN})"
            echo ""
            md_trend day "$DAYS_SHOWN" "Giorno"
            echo ""
            echo "## 🗓️ Trend per settimana (ultime ${WEEKS_SHOWN}, ISO)"
            echo ""
            md_trend week "$WEEKS_SHOWN" "Settimana"
            echo ""
            echo "## 📆 Trend per mese (ultimi ${MONTHS_SHOWN})"
            echo ""
            md_trend month "$MONTHS_SHOWN" "Mese"
            echo ""
            echo "## Per agente (finestra)"
            echo ""
            echo "| Agente | Run | Success | Failure | Durata media (s) | Stima costo |"
            echo "|---|---|---|---|---|---|"
            awk -F'\t' '
            BEGIN{
              c["Agent Summary"]=0.02; c["Agent Review"]=0.15; c["Agent Security"]=0.20;
              c["Agent Fix"]=0.10; c["Agent Docs"]=0.07; c["Agent Test"]=0.20;
              c["Agent Refactor"]=0.14; c["Agent CICD"]=0.14; c["Agent IaC"]=0.10;
              c["Agent Maintain"]=0.17;
            }
            $3!="skipped" {
              cnt[$2]++; if($3=="success")s[$2]++; if($3=="failure")f[$2]++; dur[$2]+=$4;
              cost[$2]+= (($2 in c)?c[$2]:0.10)
            } END {
              for (a in cnt) printf "| %s | %d | %d | %d | %d | $%.2f |\n", a, cnt[a], s[a]+0, f[a]+0, (cnt[a]?dur[a]/cnt[a]:0), cost[a]+0
            }' "$TMP/rows.tsv" | sort
            echo ""
            echo "## Per repository (finestra)"
            echo ""
            echo "| Repo | Run | Success | Failure |"
            echo "|---|---|---|---|"
            awk -F'\t' '$3!="skipped" {
              cnt[$1]++; if($3=="success")s[$1]++; if($3=="failure")f[$1]++
            } END {
              for (r in cnt) printf "| %s | %d | %d | %d |\n", r, cnt[r], s[r]+0, f[r]+0
            }' "$TMP/rows.tsv" | sort
            echo ""
            echo "---"
            echo "_I trend usano \`createdAt\` delle run; la settimana è ISO-8601 (lun-dom)._"
            echo "_Costo per-run (\`total_cost_usd\`) non incluso: richiederebbe il download dei log di ogni run._"
          } > "$OUT"

          # Snapshot ultimo periodo per Telegram (singola riga ciascuno)
          fmt_tg () { awk -F'\t' 'NF{printf "%s · %d run · %s · %d🔴", $1,$2,$5,$4}'; }
          D_TODAY=$(trend day 1 | fmt_tg);  [ -n "$D_TODAY" ] || D_TODAY="n/d"
          W_THIS=$(trend week 1 | fmt_tg);  [ -n "$W_THIS" ] || W_THIS="n/d"
          M_THIS=$(trend month 1 | fmt_tg); [ -n "$M_THIS" ] || M_THIS="n/d"

          {
            echo "TOTAL=$eff"; echo "SUCC=$succ"; echo "FAIL=$fail"; echo "RATE=$rate"
            echo "EST=$EST"; echo "SKIP=$skip"
            echo "D_TODAY=$D_TODAY"; echo "W_THIS=$W_THIS"; echo "M_THIS=$M_THIS"
          } >> "$GITHUB_ENV"

      - name: Commit dashboard se cambiato
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add OBSERVABILITY.md
          # --cached rileva anche i file nuovi (untracked appena aggiunti)
          if git diff --cached --quiet; then
            echo "Nessuna variazione in OBSERVABILITY.md"
          else
            git commit -m "chore: aggiorna Fleet Dashboard [skip ci]"
            git push
          fi

      - name: Riepilogo su Telegram (trend)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASH_URL: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/OBSERVABILITY.md
        run: |
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHAT_ID:-}" ]; then
            echo "::warning::TELEGRAM secrets non configurati, salto invio"; exit 0
          fi
          NOW=$(date -u +'%Y-%m-%d %H:%M UTC')
          # Newline REALI (no %0A) + parse_mode HTML (robusto con _ nei nomi).
          MSG=$(cat <<EOF
          📊 <b>Fleet Dashboard</b> · trend agenti
          <i>aggiornato ${NOW} (~18:00 Europe/Rome)</i>

          📅 Oggi: <b>${D_TODAY}</b>
          🗓️ Settimana: <b>${W_THIS}</b>
          📆 Mese: <b>${M_THIS}</b>

          Finestra ${WINDOW_DAYS}gg → ▫️ ${TOTAL} run · ✅ ${SUCC} · 🔴 ${FAIL} · 📈 ${RATE}
          💸 Stima costo: ~\$${EST} <i>(proxy, non fatturato su Max)</i>

          Trend per giorno/settimana/mese nella dashboard ↓
          EOF
          )
          KEYBOARD=$(printf '{"inline_keyboard":[[{"text":"📈 Apri dashboard","url":"%s"}]]}' "$DASH_URL")
          curl -sS --fail-with-body \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "reply_markup=${KEYBOARD}"
