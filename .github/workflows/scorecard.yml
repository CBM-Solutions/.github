name: Scorecard Supply-Chain Security

# OpenSSF Scorecard: scoring supply-chain del repo control-plane (branch
# protection, token permissions, pinned deps, dangerous workflow, ecc.).
# Pubblica i risultati su code-scanning e sull'API OpenSSF (repo pubblico).
# Serverless, zero costo. Evidenza per il controllo AISUP-03.

on:
  branch_protection_rule:
  schedule:
    - cron: "24 5 * * 1" # lunedì 05:24 UTC
  push:
    branches: [main]
  workflow_dispatch:

# Default minimo: sola lettura.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # publish_results funziona solo dal branch di default.
    if: github.event.repository.default_branch == github.ref_name
    permissions:
      # Upload dei risultati sulla dashboard code-scanning.
      security-events: write
      # Necessario per pubblicare i risultati e ottenere il badge OpenSSF.
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          # Repo pubblico: pubblica su OpenSSF REST API e abilita il badge.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: results.sarif
